
  <!DOCTYPE html>
<html lang="en">
<head>
    
    <title>Registration Form</title>
    <style>
        body { font-family: sans-serif; margin: 20px; line-height: 1.6; }
        .form-group { margin-bottom: 15px; max-width: 400px; }
        label { display: block; font-weight: bold; }
        input, select, textarea { width: 100%; padding: 8px; margin-top: 5px; box-sizing: border-box; }
        .inline { display: flex; gap: 10px; align-items: center; width: auto; }
        .inline input { width: auto; }
        button { padding: 10px 20px; background-color: #007BFF; color: white; border: none; cursor: pointer; border-radius: 4px; }
        button:hover { background-color: #0056b3; }
        .login-link { margin-top: 15px; display: block; text-decoration: none; color: #007BFF; font-size: 0.9em; }
    </style>
</head>
<body>

    <h2>Registration Form</h2>
    <form action="#" method="post">
        
        <div class="form-group">
            <label>First Name</label>
            <input type="text" name="firstname" required>
        </div>

        <div class="form-group">
            <label>Last Name</label>
            <input type="text" name="lastname" required>
        </div>

        <div class="form-group">
            <label>Contact Num</label>
            <input type="tel" name="contact" pattern="[0-9]{10}" placeholder="1234567890" required>
        </div>

        <div class="form-group">
            <label>Landline Num</label>
            <input type="tel" name="landline" placeholder="011-2345678">
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" required>
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" required>
        </div>

        <div class="form-group">
            <label>Date of Birth</label>
            <input type="date" name="dob" required>
        </div>

        <div class="form-group">
            <label>Age</label>
            <input type="number" name="age" min="1" max="120">
        </div>

        <div class="form-group">
            <label>Gender</label>
            <div class="inline">
                <input type="radio" name="gender" value="male"> Male
                <input type="radio" name="gender" value="female"> Female
                <input type="radio" name="gender" value="other"> Other
            </div>
        </div>

        <div class="form-group">
            <label>Address</label>
            <textarea name="address" rows="3"></textarea>
        </div>

        <div class="form-group">
            <label>City List</label>
            <select name="city">
                <option value="">Select City</option>
                <option value="newyork">ahmedabad</option>
                <option value="london">patan</option>
                <option value="tokyo">vadodara</option>
                <option value="mumbai">dahad</option>
            </select>
        </div>

        <div class="form-group">
            <label>Pincode</label>
            <input type="text" name="pincode" pattern="[0-9]{6}">
        </div>

        <div class="form-group">
            <label>Joining Date</label>
            <input type="date" name="joining_date" required>
        </div>

        <div class="form-group inline">
            <input type="checkbox" name="confirm" required>
            <label>Confirm your form details</label>
        </div>

        <button type="submit">Register</button>
        
        <a href="login.html" class="login-link">Already have an account? Login button</a>
    </form>

</body>
</html>


    <</body>
</body>
</html>
