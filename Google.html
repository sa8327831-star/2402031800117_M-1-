<!doctype html>
<html dir="ltr" lang="en">
  <head>
    <meta charset="utf-8">
    <title>New tab</title>
    <style>
    body{
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-family: 'sequence-ui', tahoma, geneva, verdana, sans-serif;
        background: rgb(255, 224, 224);
        color: aquamarine;
    }
    .search-bar {
            width: min(600px, 100%);
            display: flex;
            align-items: center;
            background: #ffffff;
            border: 1px solid #e5e7eb;
            border-radius: 999px;
            padding: 10px 16px;
            margin: 12px 0;
        }
        .search-bar input {
            border: none;
            outline: none;
            width: 100%;
            font-size: 0.95rem;
            color: #111827;
            background: transparent;
        }
        h1 {
            margin: 0;
            font-size: 3rem;
            letter-spacing: 0.1em;
        }
</style>
    <style>
      body {
        background: #27403C;
        margin: 0;
      }

      #backgroundImage {
        border: none;
        height: 100%;
        pointer-events: none;
        position: fixed;
        top: 0;
        visibility: hidden;
        width: 100%;
      }

      
    </style>
  </head>
  <body>
    <iframe id="backgroundImage" src=""></iframe>
    <ntp-app></ntp-app>

<img src="images.jpg" style="width: 10%; max-width: 60px; border-radius: 24px; border: 1px solid #e5e7eb; text-align:right;">
