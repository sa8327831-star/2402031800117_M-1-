
<!DOCTYPE html>
<html lang="en">
<head>
    <title>OPERATOR</title>
</head>
<body>
    <script>

var a=2;
var b=3;
        document.write( a+"<br>");
        document.write( --a+"<br>");
        document.write( ++a+"<br>");
        document.write( a+++"<br>");
        document.write( b+"<br>");
        document.write( --b+"<br>");
        document.write( ++b+"<br>");
        document.write( b+++"<br>");
     

    </script>
</body>
</html>
