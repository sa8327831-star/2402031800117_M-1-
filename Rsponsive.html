<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Responsive Layout Example</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        
        .container {
            width: 90%;
            max-width: 1100px;
            display: grid;
            gap: 20px;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }
        
        .box {
            border: 2px solid #7a8bbd;
            min-height: 120px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            font-weight: bold;
            color: #333;
        }
        
        .header {
            background: #b8c4e8;
            height: 80px;
        }
        
        .sidebar {
            background: #d7c2eb;
        }
        
        .content {
            background: #efefef;
        }
        
        .right {
            background: #efe2b6;
        }
        
        .footer {
            background: #b8c4e8;
            height: 80px;
        }
        /* Desktop Layout */
        
        .container {
            grid-template-columns: 1fr 2fr 1fr;
            grid-template-areas: "header header header" "sidebar content right" "footer footer footer";
        }
        
        .header {
            grid-area: header;
        }
        
        .sidebar {
            grid-area: sidebar;
        }
        
        .content {
            grid-area: content;
        }
        
        .right {
            grid-area: right;
        }
        
        .footer {
            grid-area: footer;
        }
        /* Tablet Layout */
        
        @media(max-width:768px) {
            .container {
                grid-template-columns: 1fr 1fr;
                grid-template-areas: "header header" "sidebar right" "content content" "footer footer";
            }
        }
        /* Mobile Layout */
        
        @media(max-width:480px) {
            .container {
                grid-template-columns: 1fr;
                grid-template-areas: "header" "sidebar" "content" "right" "footer";
            }
            .box {
                min-height: 90px;
                font-size: 20px;
            }
        }
    </style>
</head>

<body>

    <div class="container">

        <div class="box header">HEADER</div>

        <div class="box sidebar">LEFT</div>

        <div class="box content">CONTENT</div>

        <div class="box right">RIGHT</div>

        <div class="box footer">FOOTER</div>

    </div>

</body>

</html>
