<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Static To-Do App</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f9;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .container {
      background: #fff;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      width: 300px;
    }
    h1 {
      text-align: center;
      font-size: 1.5em;
      margin-bottom: 15px;
    }
    input {
      width: 80%;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    button {
      padding: 8px 12px;
      margin-left: 5px;
      border: none;
      border-radius: 4px;
      background: #4CAF50;
      color: white;
      cursor: pointer;
    }
    button:hover {
      background: #45a049;
    }
    ul {
      list-style: none;
      padding: 0;
      margin-top: 15px;
    }
    li {
      background: #e9f5e9;
      margin-bottom: 8px;
      padding: 8px;
      border-radius: 4px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .delete {
      background: red;
      padding: 4px 8px;
      border-radius: 4px;
      cursor: pointer;
      color: white;
      border: none;
    }
    .delete:hover {
      background: darkred;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>To-Do List</h1>
    <input type="text" id="taskInput" placeholder="Enter a task">
    <button onclick="addTask()">Add</button>
    <ul id="taskList"></ul>
  </div>

  <script>
    const taskInput = document.getElementById('taskInput');
    const taskList = document.getElementById('taskList');

    function addTask() {
      const task = taskInput.value.trim();
      if (task === "") return;

      const li = document.createElement('li');
      li.textContent = task;

      const delBtn = document.createElement('button');
      delBtn.textContent = "Delete";
      delBtn.classList.add('delete');
      delBtn.onclick = () => li.remove();

      li.appendChild(delBtn);
      taskList.appendChild(li);

      taskInput.value = "";
    }
  </script>
</body>
</html>
