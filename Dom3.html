<!DOCTYPE html>
<html lang="en">
    <html>
<head>
    <title>Document</title>
    <script>
    function checkMail()
{
var a=document.getElementById("email").value;
var pattern=/^[^ ]+@[^ ]+\.[a-z]{2,3}$/;
var regex=new RegExp(pattern);
if(regex.test(a))
{
    alert("Valid email address");
}
else
{
    alert("Invalid email address");
}
}
        </script>

</head>
<body>
    <input type="text" id="email" placeholder="Enter Your Email" style="background-color: black; color: white;">
    <button onclick="checkMail()" style="background-color: blue; color: white;">Check Email</button>
</body>
</html>
