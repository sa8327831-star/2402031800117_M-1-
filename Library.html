<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Library Management Dashboard</title>
    <script src="https://tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen font-sans antialiased text-gray-800">
    <header class="bg-indigo-600 text-white shadow-md">
        <div class="max-w-7xl mx-auto px-4 py-4 flex flex-col sm:flex-row justify-between items-center gap-4">
            <h1 class="text-2xl font-bold tracking-tight">📚 NexusLibrary System</h1>
            <div class="relative w-full sm:w-72">
                <input type="text" id="searchInput" oninput="filterBooks()" placeholder="Search by title, author, or ISBN..." class="w-full pl-4 pr-4 py-2 rounded-lg bg-indigo-700 text-white placeholder-indigo-300 focus:outline-none focus:ring-2 focus:ring-white border-none text-sm transition-all">
            </div>
        </div>
    </header>
    <main class="max-w-7xl mx-auto px-4 py-8">
        <section class="grid grid-cols-1 sm:grid-cols-3 gap-6 mb-8">
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 flex flex-col">
                <span class="text-sm font-medium text-gray-400 uppercase tracking-wider">Total Inventory</span>
                <span id="statTotal" class="text-3xl font-bold text-gray-900 mt-1">0</span>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 flex flex-col">
                <span class="text-sm font-medium text-gray-400 uppercase tracking-wider">Available Books</span>
                <span id="statAvailable" class="text-3xl font-bold text-emerald-600 mt-1">0</span>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 flex flex-col">
                <span class="text-sm font-medium text-gray-400 uppercase tracking-wider">Issued Out</span>
                <span id="statIssued" class="text-3xl font-bold text-amber-500 mt-1">0</span>
            </div>
        </section>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 items-start">
        
            <section class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                <h2 class="text-lg font-bold text-gray-900 mb-4 border-b pb-2">Add New Book</h2>
                <form id="bookForm" onsubmit="handleFormSubmit(event)" class="space-y-4">
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 uppercase mb-1">Book Title</label>
                        <input type="text" id="title" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 uppercase mb-1">Author</label>
                        <input type="text" id="author" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 uppercase mb-1">ISBN / Unique Key</label>
                        <input type="text" id="isbn" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm">
                    </div>
                    <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2.5 px-4 rounded-lg text-sm transition-colors shadow-sm">
                        Save to Catalogue
                    </button>
                </form>
            </section>

            <section class="lg:col-span-2 bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                <div class="px-6 py-4 border-b border-gray-100">
                    <h2 class="text-lg font-bold text-gray-900">Live Catalogue Inventory</h2>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-gray-50 text-xs font-semibold text-gray-500 uppercase border-b border-gray-100">
                                <th class="px-6 py-3.5">Book Details</th>
                                <th class="px-6 py-3.5">ISBN</th>
                                <th class="px-6 py-3.5">Status</th>
                                <th class="px-6 py-3.5 text-right">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="inventoryList" class="divide-y divide-gray-100 text-sm">
                    
                        </tbody>
                    </table>
                </div>
                <div id="emptyState" class="hidden text-center py-12 text-gray-400">
                    No books match your catalogue specifications.
                </div>
            </section>
        </div>
    </main>
    <script>
        // Reactive local database fallback configuration
        let books = JSON.parse(localStorage.getItem('library_db')) || [
            { id: "1", title: "The Great Gatsby", author: "F. Scott Fitzgerald", isbn: "9780743273565", issued: false },
            { id: "2", title: "To Kill a Mockingbird", author: "Harper Lee", isbn: "9780446310789", issued: true }
        ];

        // Component lifecycle entry point
        document.addEventListener("DOMContentLoaded", () => {
            renderCatalogue();
        });

        // Syncs data array safely to hardware storage and triggers DOM redraws
        function syncAndRefresh() {
            localStorage.setItem('library_db', JSON.stringify(books));
            renderCatalogue();
        }

        // Processes adding books
        function handleFormSubmit(event) {
            event.preventDefault();
            
            const titleInput = document.getElementById('title');
            const authorInput = document.getElementById('author');
            const isbnInput = document.getElementById('isbn');

            const newBook = {
                id: Date.now().toString(),
                title: titleInput.value.trim(),
                author: authorInput.value.trim(),
                isbn: isbnInput.value.trim(),
                issued: false
            };

            books.push(newBook);
            syncAndRefresh();
            document.getElementById('bookForm').reset();
        }

        // Deletes a book from the list
        function deleteBook(id) {
            books = books.filter(book => book.id !== id);
            syncAndRefresh();
        }

        // Toggles status between "Issued" and "Available"
        function toggleIssueStatus(id) {
            books = books.map(book => {
                if (book.id === id) {
                    return { ...book, issued: !book.issued };
                }
                return book;
            });
            syncAndRefresh();
        }
        function filterBooks() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = books.filter(book => 
                book.title.toLowerCase().includes(query) || 
                book.author.toLowerCase().includes(query) || 
                book.isbn.toLowerCase().includes(query)
            );
            renderCatalogue(filtered);
        }

        // Standard dynamic HTML UI renderer Engine
        function renderCatalogue(dataset = books) {
            const listContainer = document.getElementById('inventoryList');
            const emptyState = document.getElementById('emptyState');
            
            listContainer.innerHTML = '';

            if (dataset.length === 0) {
                emptyState.classList.remove('hidden');
            } else {
                emptyState.classList.add('hidden');
                dataset.forEach(book => {
                    const row = document.createElement('tr');
                    row.className = "hover:bg-gray-50/70 transition-colors";
                    row.innerHTML = `
                        <td class="px-6 py-4">
                            <div class="font-medium text-gray-900">${escapeHTML(book.title)}</div>
                            <div class="text-xs text-gray-400 mt-0.5">by ${escapeHTML(book.author)}</div>
                        </td>
                        <td class="px-6 py-4 text-xs font-mono tracking-wider text-gray-500">${escapeHTML(book.isbn)}</td>
                        <td class="px-6 py-4">
                            <span class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs font-semibold ${
                                book.issued 
                                ? 'bg-amber-50 text-amber-700 border border-amber-200' 
                                : 'bg-emerald-50 text-emerald-700 border border-emerald-200'
                            }">
                                <span class="w-1.5 h-1.5 rounded-full ${book.issued ? 'bg-amber-500' : 'bg-emerald-500'}"></span>
                                ${book.issued ? 'Issued Out' : 'Available'}
                            </span>
                        </td>
                        <td class="px-6 py-4 text-right space-x-2 whitespace-nowrap">
