<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Onclick Button</title>
    <link href="https://jsdelivr.net" rel="stylesheet">
</head>
<body class="p-5">

    <button type="button" class="btn btn-primary" style="background-color:red;" onclick="myFunction()">
        Click Me
    </button>
    <script>
        function myFunction() {
            alert("Button was clicked!");
            console.log("The onclick event worked successfully.");
        }
    </script>
    <script src="https://jsdelivr.net"></script>
</body>
</html>
