<!DOCTYPE html>
<html lang="en">
<head>
    
    <title>Document</title>
</head>
<body>
    <script>
let numbers = [2, 3, 4, 5, 6, 7];
let max = numbers[0];
for (let i = 1; i < numbers.length; i++) {
    if (numbers[i] > max) {
        max = numbers[i];
    }
}
document.write("The greatest number is: " + max);
    </script>
</body>
</html>
