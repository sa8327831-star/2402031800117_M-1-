<!DOCTYPE html>
<html lang="en">

</head>
<body>
    <h2> javascript variables</h2>
    <p> in this example,x,y,and z are examples of javascript variables</p>
    <p id="demo"></p>
    <script>
        var x=5;
        var y=6;
        var z=x+y;
        var s=x-y;
        var w=x*y;
        var u=x/y;
        var v=x%y;

        document.getElementById("demo").innerHTML="the value of z is:" + z + "<br>" + "the value of s is:" + s + "<br>" + "the value of w is:" + w + "<br>" + "the value of u is:" + u + "<br>" + "the value of v is:" + v;
        </script>
</body>
</html>
