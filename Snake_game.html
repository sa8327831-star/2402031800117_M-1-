<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Snake and Ladder Game</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f9;
      text-align: center;
      margin: 0;
      padding: 20px;
    }
    h1 { margin-bottom: 20px; }
    #board {
      display: grid;
      grid-template-columns: repeat(10, 40px);
      grid-template-rows: repeat(10, 40px);
      gap: 2px;
      margin: auto;
      width: 420px;
      border: 2px solid #333;
    }
    .cell {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      background: #fff;
      border: 1px solid #ccc;
      position: relative;
    }
    .player {
      width: 15px;
      height: 15px;
      border-radius: 50%;
      position: absolute;
    }
    .p1 { background: red; top: 2px; left: 2px; }
    .p2 { background: blue; bottom: 2px; right: 2px; }
    #controls { margin-top: 20px; }
    button {
      padding: 10px 20px;
      margin: 10px;
      font-size: 1em;
      border: none;
      border-radius: 4px;
      background: #4CAF50;
      color: white;
      cursor: pointer;
    }
    button:hover { background: #45a049; }
    #message { font-weight: bold; margin-top: 10px; }
  </style>
</head>
<body>
  <h1>Snake and Ladder</h1>
  <div id="board"></div>
  <div id="controls">
    <button onclick="rollDice()">Roll Dice</button>
    <div id="message"></div>
  </div>

  <script>
    const board = document.getElementById('board');
    const message = document.getElementById('message');
    let positions = [0, 0]; // Player positions
    let currentPlayer = 0;

    // Snakes and ladders mapping
    const snakes = {16:6, 47:26, 49:11, 56:53, 62:19, 64:60, 87:24, 93:73, 95:75, 98:78};
    const ladders = {1:38, 4:14, 9:31, 21:42, 28:84, 36:44, 51:67, 71:91, 80:100};

    // Create board
    function createBoard() {
      board.innerHTML = "";
      for (let i = 100; i >= 1; i--) {
        const cell = document.createElement('div');
        cell.classList.add('cell');
        cell.textContent = i;
        cell.id = "cell-" + i;
        board.appendChild(cell);
      }
      updatePlayers();
    }

    function rollDice() {
      if (positions[currentPlayer] >= 100) return;
      const dice = Math.floor(Math.random() * 6) + 1;
      message.textContent = `Player ${currentPlayer+1} rolled a ${dice}`;
      let newPos = positions[currentPlayer] + dice;

      if (newPos > 100) newPos = positions[currentPlayer]; // can't overshoot

      // Check ladders
      if (ladders[newPos]) {
        message.textContent += ` 🎉 Ladder up to ${ladders[newPos]}`;
        newPos = ladders[newPos];
      }

      // Check snakes
      if (snakes[newPos]) {
        message.textContent += ` 🐍 Snake down to ${snakes[newPos]}`;
        newPos = snakes[newPos];
      }

      positions[currentPlayer] = newPos;
      updatePlayers();

      if (newPos === 100) {
        message.textContent = `Player ${currentPlayer+1} wins! 🎊`;
        return;
      }

      currentPlayer = currentPlayer === 0 ? 1 : 0;
      message.textContent += ` | Player ${currentPlayer+1}'s turn`;
    }

    function updatePlayers() {
      for (let i = 1; i <= 100; i++) {
        const cell = document.getElementById('cell-' + i);
        if (!cell) continue;
        cell.innerHTML = i;
      }

      positions.forEach((pos, idx) => {
        if (pos > 0) {
          const cell = document.getElementById('cell-' + pos);
          if (cell) {
            const playerDot = document.createElement('div');
            playerDot.classList.add('player', idx === 0 ? 'p1' : 'p2');
            cell.appendChild(playerDot);
          }
        }
      });
    }

    createBoard();
  </script>
</body>
</html>
