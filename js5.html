<script>
function isPrime(num) {
    if (num <= 1) return false;
    for (let i = 2; i <= Math.sqrt(num); i++) {
        if (num % i === 0) return false;
    }
    return true;
}

// Example usage
var number = 17;
if (isPrime(number)) {
    document.write(number + " is a prime number<br>");
} else {
    document.write(number + " is not a prime number<br>");
}
</script>
